services:
  - type: web
    name: forgeengine-api
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npx tsx backend/server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: forgeengine_ultra_secure_2026
      - key: REDIS_URL
        fromService:
          type: redis
          name: forgeengine-redis
          property: connectionString

  - type: worker
    name: forgeengine-worker
    runtime: node
    buildCommand: npm install
    startCommand: npx tsx worker/worker.ts
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: forgeengine-redis
          property: connectionString
      - key: JWT_SECRET
        value: forgeengine_ultra_secure_2026

  - type: redis
    name: forgeengine-redis
    plan: free
